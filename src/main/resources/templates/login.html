<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="relative bg-cover bg-center flex items-center justify-center h-screen overflow-hidden select-none" style="background-image: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974&auto=format&fit=crop');">
    
    <div class="absolute w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse -top-10 -left-10"></div>
    <div class="absolute w-96 h-96 bg-cyan-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse -bottom-10 -right-10"></div>

    <div class="relative bg-white/10 backdrop-blur-2xl border border-white/20 p-8 rounded-3xl shadow-2xl w-96 max-w-sm mx-4 transform transition duration-500 hover:scale-[1.01]">
        <h2 class="text-3xl font-extrabold mb-6 text-center text-white tracking-wide drop-shadow-sm">Welcome Back</h2>
        
        <div th:if="${param.error}" class="bg-red-500/20 backdrop-blur-md border border-red-500/30 text-red-200 px-4 py-2 rounded-xl mb-4 text-sm text-center">
            Username atau password salah!
        </div>
        
        <div th:if="${param.logout}" class="bg-emerald-500/20 backdrop-blur-md border border-emerald-500/30 text-emerald-200 px-4 py-2 rounded-xl mb-4 text-sm text-center">
            Anda telah berhasil logout.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label class="block text-white/80 text-xs font-semibold mb-2 uppercase tracking-wider">Username</label>
                <input type="text" name="username" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-cyan-300 focus:bg-white/15 transition duration-200 text-sm" required placeholder="Masukkan username">
            </div>
            <div>
                <label class="block text-white/80 text-xs font-semibold mb-2 uppercase tracking-wider">Password</label>
                <input type="password" name="password" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-cyan-300 focus:bg-white/15 transition duration-200 text-sm" required placeholder="••••••••">
            </div>
            <button type="submit" class="w-full mt-2 bg-gradient-to-r from-cyan-400 to-purple-500 hover:from-cyan-500 hover:to-purple-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-purple-500/30 transition duration-300 active:scale-[0.98]">Sign In</button>
        </form>
        
        <p class="mt-6 text-xs text-center text-white/60">
            Belum punya akun? <a th:href="@{/register}" class="text-cyan-300 font-bold hover:text-cyan-200 transition underline decoration-cyan-300/40">Daftar sekarang</a>
        </p>
    </div>
</body>
</html>
