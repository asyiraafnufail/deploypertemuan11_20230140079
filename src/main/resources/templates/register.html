<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="relative bg-cover bg-center flex items-center justify-center h-screen overflow-hidden select-none" style="background-image: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974&auto=format&fit=crop');">
    
    <div class="absolute w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse -bottom-10 -left-10"></div>
    <div class="absolute w-96 h-96 bg-cyan-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse -top-10 -right-10"></div>

    <div class="relative bg-white/10 backdrop-blur-2xl border border-white/20 p-8 rounded-3xl shadow-2xl w-96 max-w-sm mx-4 transform transition duration-500 hover:scale-[1.01]">
        <h2 class="text-3xl font-extrabold mb-6 text-center text-white tracking-wide drop-shadow-sm">Create Account</h2>
        
        <form th:action="@{/register}" method="post" class="space-y-4">
            <div>
                <label class="block text-white/80 text-xs font-semibold mb-1 uppercase tracking-wider">Username</label>
                <input type="text" name="username" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-purple-300 focus:bg-white/15 transition duration-200 text-sm" required placeholder="Username baru">
            </div>
            <div>
                <label class="block text-white/80 text-xs font-semibold mb-1 uppercase tracking-wider">Password</label>
                <input type="password" name="password" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-purple-300 focus:bg-white/15 transition duration-200 text-sm" required placeholder="••••••••">
            </div>
            <div>
                <label class="block text-white/80 text-xs font-semibold mb-1 uppercase tracking-wider">Nama Lengkap</label>
                <input type="text" name="nama" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-purple-300 focus:bg-white/15 transition duration-200 text-sm" required placeholder="Nama lengkap Anda">
            </div>
            <div>
                <label class="block text-white/80 text-xs font-semibold mb-1 uppercase tracking-wider">Alamat</label>
                <textarea name="alamat" rows="2" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-purple-300 focus:bg-white/15 transition duration-200 text-sm resize-none" required placeholder="Alamat rumah tempat tinggal"></textarea>
            </div>
            <button type="submit" class="w-full mt-2 bg-gradient-to-r from-purple-500 to-cyan-400 hover:from-purple-600 hover:to-cyan-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-cyan-500/30 transition duration-300 active:scale-[0.98]">Sign Up</button>
        </form>
        
        <p class="mt-5 text-xs text-center text-white/60">
            Sudah punya akun? <a th:href="@{/login}" class="text-purple-300 font-bold hover:text-purple-200 transition underline decoration-purple-300/40">Login di sini</a>
        </p>
    </div>
</body>
</html>
