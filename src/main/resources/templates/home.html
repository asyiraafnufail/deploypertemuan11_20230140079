<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">Praktikum Pertemuan 11</h1>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600 font-semibold transition duration-200">Logout</button>
        </form>
    </nav>
    
    <div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-3xl font-bold mb-4 text-gray-800">Selamat Datang!</h2>
        <p class="text-gray-600 mb-6">Anda telah berhasil lolos dari sistem autentikasi keamanan kustom Spring Security.</p>
        
        <div class="border-t pt-4">
            <h3 class="text-lg font-semibold text-gray-700 mb-2">Status Sesi:</h3>
            <p class="text-sm text-green-600 bg-green-50 inline-block px-3 py-1 rounded-full font-medium border border-green-200">✓ Terautentikasi (Role: USER)</p>
        </div>
    </div>
</body>
</html>
